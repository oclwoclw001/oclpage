<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCL 热点导航</title>
  <link rel="stylesheet" href="hot.css">
</head>
<body class="portal-body">
  <div class="bg bg-a"></div>
  <div class="bg bg-b"></div>
  <main class="page">
    <section class="hero hero-portal">
      <div>
        <p class="eyebrow">OCLPAGE</p>
        <h1>热点导航台</h1>
        <p class="subtitle">首页改成多入口导航。百度热搜、新浪热点、淄博热点和俄罗斯方块分开独立，避免把游戏继续顶在首页。</p>
      </div>
      <div class="hero-actions">
        <a class="primary" href="baidu.html">打开百度热搜</a>
        <a class="secondary" href="sina.html">打开新浪热点</a>
      </div>
    </section>

    <section class="portal-grid">
      <a class="portal-card portal-accent" href="baidu.html">
        <p class="card-kicker">Baidu</p>
        <h2>百度热搜</h2>
        <p>实时拉取百度热搜榜，展示标题、热度和原始跳转链接。</p>
        <span>进入页面</span>
      </a>
      <a class="portal-card portal-cool" href="sina.html">
        <p class="card-kicker">Sina</p>
        <h2>新浪热点</h2>
        <p>抓新浪新闻首页的热点与热榜区，避免再混入无关导航栏目。</p>
        <span>进入页面</span>
      </a>
      <a class="portal-card portal-earth" href="zibo.html">
        <p class="card-kicker">Zibo</p>
        <h2>淄博热点</h2>
        <p>聚合淄博新闻网、齐鲁网、鲁中晨报等主流媒体里与淄博相关的报道。</p>
        <span>进入页面</span>
      </a>
      <a class="portal-card portal-dark" href="tetris.html">
        <p class="card-kicker">Play</p>
        <h2>俄罗斯方块</h2>
        <p>保留原来的小游戏，但它现在只作为一个独立入口存在。</p>
        <span>进入页面</span>
      </a>
    </section>
  </main>
</body>
</html>
