<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>热榜雷达</title>
  <link rel="stylesheet" href="hot.css">
</head>
<body>
  <div class="bg bg-a"></div>
  <div class="bg bg-b"></div>
  <main class="page">
    <section class="hero">
      <div>
        <p class="eyebrow">OCLPAGE</p>
        <h1>热榜雷达</h1>
        <p class="subtitle">实时聚合百度热搜与新浪热点，打开就能刷当下最热的话题。下方保留俄罗斯方块入口，但不再占首页。</p>
      </div>
      <div class="hero-actions">
        <button id="refresh-all" class="primary">立即刷新</button>
        <a class="secondary" href="tetris.html">去玩俄罗斯方块</a>
      </div>
    </section>

    <section class="meta-bar">
      <div class="meta-card">
        <span>上次刷新</span>
        <strong id="last-updated">--</strong>
      </div>
      <div class="meta-card">
        <span>数据源</span>
        <strong>百度 / 新浪</strong>
      </div>
      <div class="meta-card">
        <span>说明</span>
        <strong>页面端实时拉取</strong>
      </div>
    </section>

    <section class="boards">
      <article class="board-card">
        <div class="board-head">
          <div>
            <p class="board-kicker">Baidu</p>
            <h2>百度热搜</h2>
          </div>
          <button class="ghost-button" data-source="baidu">刷新</button>
        </div>
        <p class="board-note">抓取百度实时热搜榜，展示关键词与热度。</p>
        <div id="baidu-status" class="status">正在加载…</div>
        <ol id="baidu-list" class="rank-list"></ol>
      </article>

      <article class="board-card">
        <div class="board-head">
          <div>
            <p class="board-kicker">Sina</p>
            <h2>新浪热点</h2>
          </div>
          <button class="ghost-button" data-source="sina">刷新</button>
        </div>
        <p class="board-note">抓取新浪新闻首页热点，展示最新高频头条。</p>
        <div id="sina-status" class="status">正在加载…</div>
        <ol id="sina-list" class="rank-list"></ol>
      </article>
    </section>
  </main>

  <script src="hot.js"></script>
</body>
</html>
